<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NB Fishing Rules</title>
    <link rel="preconnect" href="https://gis-erd-der.gnb.ca">
</head>
<body class="bg-gray-100 h-screen w-screen flex justify-center font-sans text-gray-800 overflow-hidden">

    <div class="w-full max-w-md bg-white h-full relative shadow-2xl overflow-hidden flex flex-col">
        
        <header id="navbar" class="w-full h-[50px] bg-[#1873b9] text-white flex items-center justify-between px-4 shrink-0 z-30 shadow-md">
            <button class="p-1" aria-label="返回">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
            </button>
            <h1 class="text-[17px] font-bold tracking-wide">NB Fishing Rules</h1>
            <button id="share-btn" class="p-1" aria-label="分享">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
            </button>
        </header>

        <main class="flex-1 relative z-0">
            <div id="map" class="absolute inset-0 w-full h-full"></div>
            
            <div class="absolute top-4 right-2.5 z-[1000] flex flex-col space-y-2">
                <button id="zoom-in-btn" class="w-[36px] h-[36px] bg-white rounded shadow-md flex items-center justify-center text-gray-700 font-bold text-xl active:bg-gray-100 border border-gray-100">+</button>
                <button id="zoom-out-btn" class="w-[36px] h-[36px] bg-white rounded shadow-md flex items-center justify-center text-gray-700 font-bold text-xl active:bg-gray-100 border border-gray-100">−</button>
                <button id="layer-toggle-btn" class="w-[36px] h-[36px] bg-white rounded shadow-md flex items-center justify-center text-gray-700 active:bg-gray-100 border border-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
                </button>
                <button id="locate-btn" class="w-[36px] h-[36px] bg-white rounded shadow-md flex items-center justify-center text-gray-700 active:bg-gray-100 border border-gray-100">
                    <svg id="icon-target" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v2m0 12v2m8-8h-2M6 12H4" /></svg>
                    <svg id="icon-spinner" class="animate-spin h-5 w-5 text-blue-600 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </div>

            <div class="main-hint absolute top-2 left-1/2 -translate-x-1/2 z-[1000] bg-white/90 backdrop-blur px-3 py-1 rounded-full shadow-sm text-[10px] font-bold text-[#1873b9]">
                Click water body to query
            </div>
        </main>

        <!-- 【修复】去除冲突的 Tailwind 布局类，使用 input.css 中的绝对规则 -->
        <section id="bottom-sheet">
            <div id="sheet-header" class="px-5 pt-3 pb-3 shrink-0 border-b border-gray-100 cursor-pointer touch-none">
                <div class="w-full flex justify-center pb-3"><div class="w-12 h-1.5 bg-gray-200 rounded-full"></div></div>
                
                <div class="flex items-center space-x-2 mb-2">
                    <label for="rule-date" class="text-[14px] font-bold text-gray-900">Query Date:</label>
                    <input type="date" id="rule-date" class="bg-gray-100 rounded px-2 py-0.5 text-[14px] text-gray-800 focus:ring-1 focus:ring-blue-500" />
                </div>

                <div id="water-name" class="text-[18px] font-extrabold text-gray-900 leading-tight mb-1">Unnamed Water Body</div>

                <div class="flex items-center space-x-4 text-[13px] text-gray-600">
                    <p><span id="label-water-def" class="font-bold mr-1">Water Definition:</span><span id="water-definition">-</span></p>
                    <p><span id="label-tidal-status" class="font-bold mr-1">Is Tidal:</span><span id="tidal-status">-</span></p>
                </div>
            </div>

            <div id="results-container" class="flex-1 overflow-y-auto p-5 custom-scrollbar relative">
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-gray-400 space-y-2">
                    <p class="text-sm">Click map above to get rules</p>
                </div>
                <div id="loading-state" class="hidden h-full flex flex-col items-center justify-center space-y-4">
                    <div class="loader"></div>
                    <p class="text-xs text-gray-500 animate-pulse">Querying database...</p>
                </div>
                <div id="rules-content" class="hidden space-y-4 pb-10"></div>
            </div>
        </section>

        <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-gray-800/90 text-white px-4 py-2 rounded-full text-xs opacity-0 pointer-events-none transition-opacity duration-300 z-[3000]">
            Tips
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
