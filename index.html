<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NB Fishing Rules</title>
    <link rel="preconnect" href="https://gis-erd-der.gnb.ca">
</head>
<body class="bg-slate-50 h-screen w-screen flex justify-center font-sans text-slate-900 overflow-hidden">

    <div class="w-full max-w-md bg-white h-full relative shadow-[0_0_50px_-12px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col">
        
        <header id="navbar" class="w-full h-[50px] flex items-center justify-between px-5 shrink-0 z-30">
            <button class="p-1 hover:opacity-60 transition-opacity" aria-label="返回">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
            </button>
            <h1 class="text-[15px] font-black tracking-tight text-slate-900">NB Fishing Rules</h1>
            <button id="share-btn" class="p-1 hover:opacity-60 transition-opacity" aria-label="分享">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
            </button>
        </header>

        <main class="flex-1 relative z-0">
            <div id="map" class="absolute inset-0 w-full h-full"></div>
            
            <!-- 精致按钮岛 -->
            <div class="absolute top-4 right-3 z-[1000] flex flex-col space-y-3">
                <button id="zoom-in-btn" class="map-control-btn w-[40px] h-[40px] rounded-xl flex items-center justify-center text-slate-700 font-bold text-xl">+</button>
                <button id="zoom-out-btn" class="map-control-btn w-[40px] h-[40px] rounded-xl flex items-center justify-center text-slate-700 font-bold text-xl">−</button>
                <button id="layer-toggle-btn" class="map-control-btn w-[40px] h-[40px] rounded-xl flex items-center justify-center text-slate-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
                </button>
                <button id="locate-btn" class="map-control-btn w-[40px] h-[40px] rounded-xl flex items-center justify-center text-slate-700">
                    <svg id="icon-target" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v2m0 12v2m8-8h-2M6 12H4" /></svg>
                    <svg id="icon-spinner" class="animate-spin h-5 w-5 text-blue-600 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </div>

            <div class="main-hint absolute top-4 left-1/2 -translate-x-1/2 z-[1000] bg-white/80 backdrop-blur-md px-4 py-1.5 rounded-full shadow-sm border border-black/5 text-[9px] font-black uppercase tracking-[0.1em] text-slate-500">
                Click map to query rules
            </div>
        </main>

        <section id="bottom-sheet">
            <div id="sheet-header" class="px-6 pt-2 pb-5 shrink-0 border-b border-slate-50 cursor-pointer touch-none">
                <div class="w-full flex justify-center py-3"><div class="w-12"></div></div>
                
                <div class="flex items-center justify-between mb-4">
                    <div id="water-name" class="text-xl font-black text-slate-900 leading-tight">Unnamed Water</div>
                    <div class="flex items-center bg-slate-100 rounded-lg px-2 py-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-slate-400 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        <input type="date" id="rule-date" class="bg-transparent text-[11px] font-bold text-slate-600 focus:outline-none" />
                    </div>
                </div>

                <div class="flex items-center space-x-6">
                    <div>
                        <span id="label-water-def" class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-0.5">Classification</span>
                        <span id="water-definition" class="text-xs font-bold text-slate-700">-</span>
                    </div>
                    <div class="h-6 w-[1px] bg-slate-100"></div>
                    <div>
                        <span id="label-tidal-status" class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-0.5">Tidal Zone</span>
                        <span id="tidal-status" class="text-xs font-bold text-slate-700">-</span>
                    </div>
                </div>
            </div>

            <div id="results-container" class="flex-1 overflow-y-auto p-6 custom-scrollbar relative bg-slate-50/30">
                <div id="empty-state" class="h-full flex flex-col items-center justify-center space-y-3 opacity-40">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    <p class="text-[11px] font-black uppercase tracking-widest">Select a location on the map</p>
                </div>
                <div id="loading-state" class="hidden h-full flex flex-col items-center justify-center">
                    <!-- 动态加载由 JS 渲染 -->
                </div>
                <div id="rules-content" class="hidden space-y-4 pb-10"></div>
            </div>
        </section>

        <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-xl z-[3000] opacity-0 pointer-events-none transition-all duration-500">
            Tips
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
